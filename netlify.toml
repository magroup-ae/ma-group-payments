[build]
  publish = "public"
  # No build step — the site is static and the functions are pre-bundled.
  command = ""

[functions]
  directory = "netlify/functions"
  # Use the file-trace bundler so our pre-bundled functions are shipped as-is
  # (never re-transformed), keeping deploys identical to the tested build.
  node_bundler = "zisi"

# NOTE: the api function serves /api/* directly via its own `config.path`
# (export const config = { path: "/api/*" }). We deliberately DO NOT add a
# redirect to /.netlify/functions/api/* — that legacy path is not exposed for
# v2 path-routed functions and force-redirecting to it breaks all /api calls.
